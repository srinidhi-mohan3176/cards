<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Offer Cards</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(to bottom right,#000,#1f1f1f);
      padding:30px;
    }

    /* Card Container */

    .card-container{
      display:flex;
      gap:25px;
      flex-wrap:wrap;
      justify-content:center;
    }

    /* Music Card */

    .music-card{
      width:320px;
      background:#18181b;
      border-radius:20px;
      overflow:hidden;
      color:white;
      box-shadow:0 10px 25px rgba(0,0,0,0.5);
      transition:0.3s ease;
    }

    .music-card:hover{
      transform:translateY(-8px);
    }

    .image-section{
      position:relative;
    }

    .image-section img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .offer-badge{
      position:absolute;
      top:15px;
      left:15px;
      background:#ec4899;
      padding:8px 14px;
      border-radius:20px;
      font-size:14px;
      font-weight:bold;
    }

    .content{
      padding:20px;
    }

    .content h2{
      font-size:24px;
      margin-bottom:10px;
    }

    .content p{
      color:#a1a1aa;
      line-height:1.6;
      margin-bottom:20px;
      font-size:15px;
    }

    .price-section{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:20px;
    }

    .new-price{
      font-size:34px;
      font-weight:bold;
      color:#ec4899;
    }

    .old-price{
      text-decoration:line-through;
      color:#a1a1aa;
      font-size:18px;
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:#ec4899;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s ease;
    }

    .btn:hover{
      background:#db2777;
    }

    /* Tablet */

    @media (max-width:768px){

      .card-container{
        gap:20px;
      }

      .music-card{
        width:75%;
      }

    }

    /* Mobile */

    @media (max-width:480px){

      .music-card{
        width:100%;
      }

      .image-section img{
        height:200px;
      }

      .content h2{
        font-size:20px;
      }

      .new-price{
        font-size:28px;
      }

      .btn{
        font-size:14px;
        padding:12px;
      }

    }

  </style>

</head>

<body>

  <div class="card-container">

    <!-- Card 1 -->

    <div class="music-card">

      <div class="image-section">
        <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200&auto=format&fit=crop">
        <span class="offer-badge">Limited Offer</span>
      </div>

      <div class="content">
        <h2>Premium Music Pass</h2>

        <p>
          Enjoy ad-free songs and unlimited streaming anytime.
        </p>

        <div class="price-section">
          <span class="new-price">₹99</span>
          <span class="old-price">₹299</span>
        </div>

        <button class="btn">Get Offer</button>
      </div>

    </div>

    <!-- Card 2 -->

    <div class="music-card">

      <div class="image-section">
        <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1200&auto=format&fit=crop">
        <span class="offer-badge">Hot Deal</span>
      </div>

      <div class="content">
        <h2>DJ Party Pack</h2>

        <p>
          Access party playlists and premium DJ sound collections.
        </p>

        <div class="price-section">
          <span class="new-price">₹149</span>
          <span class="old-price">₹399</span>
        </div>

        <button class="btn">Buy Now</button>
      </div>

    </div>

    <!-- Card 3 -->

    <div class="music-card">

      <div class="image-section">
        <img src="https://images.unsplash.com/photo-1501612780327-45045538702b?q=80&w=1200&auto=format&fit=crop">
        <span class="offer-badge">New</span>
      </div>

      <div class="content">
        <h2>Studio Beats</h2>

        <p>
          Unlock exclusive studio-quality beats and audio tracks.
        </p>

        <div class="price-section">
          <span class="new-price">₹199</span>
          <span class="old-price">₹499</span>
        </div>

        <button class="btn">Explore</button>
      </div>

    </div>

  </div>

</body>
</html>
